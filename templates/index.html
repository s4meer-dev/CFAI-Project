<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithm Benchmark & Complexity Visualization</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>Algorithm Benchmark Visualizer</h1>
        <p>Project initial setup complete. Ready for development!</p>
    </header>
    <main class="container">
        <section class="controls-section">
            <div class="card">
                <h2>Configure Benchmark</h2>
                <form id="benchmark-form">
                    <div class="form-group">
                        <label for="algorithm">Algorithm Type</label>
                        <select id="algorithm" name="algorithm">
                            <optgroup label="Sorting Algorithms">
                                <option value="bubble_sort">Bubble Sort</option>
                                <option value="selection_sort">Selection Sort</option>
                                <option value="insertion_sort">Insertion Sort</option>
                                <option value="merge_sort">Merge Sort</option>
                                <option value="quick_sort">Quick Sort</option>
                            </optgroup>
                            <optgroup label="Searching Algorithms">
                                <option value="linear_search">Linear Search</option>
                                <option value="binary_search">Binary Search</option>
                                <option value="jump_search">Jump Search</option>
                            </optgroup>
                        </select>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="data-size">Data Size</label>
                            <input type="number" id="data-size" name="data-size" value="1000" min="10" max="100000">
                        </div>
                        <div class="form-group">
                            <label for="data-type">Initial Data State</label>
                            <select id="data-type" name="data-type">
                                <option value="random">Randomly Shuffled</option>
                                <option value="sorted">Already Sorted</option>
                                <option value="reversed">Reverse Sorted</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="iterations">Iterations (for average)</label>
                        <input type="number" id="iterations" name="iterations" value="5" min="1" max="50">
                    </div>
                    <div class="button-group">
                        <button type="submit" class="btn-primary">Run Benchmark</button>
                        <button type="button" id="clear-chart" class="btn-secondary">Clear Chart</button>
                    </div>
                </form>
            </div>
        </section>
        
        <section class="visualization-section">
            <div class="card">
                <h2>Performance Visualization</h2>
                <div class="chart-container" style="position: relative; height: 60vh; width: 100%;">
                    <canvas id="benchmarkChart"></canvas>
                </div>
            </div>
        </section>
    </main>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
