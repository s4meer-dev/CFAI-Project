<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Sorting Algorithms</title>
    <!-- Modern Font: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Background elements for aesthetic -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    
    <header>
        <h1>Sorting Visualizer <span>Pro</span></h1>
        <p>Side-by-Side Algorithm Comparison</p>
    </header>
    
    <main class="container">
        <!-- Global Controls (Top Panel) -->
        <section class="glass-panel global-controls">
            <div class="control-group input-mode">
                <label>Array Input Mode</label>
                <div class="input-toggle">
                    <label><input type="radio" name="input_mode" value="random" checked> Random Array</label>
                    <label><input type="radio" name="input_mode" value="custom"> Custom Input</label>
                </div>
            </div>
            
            <div class="control-group random-controls">
                <label for="array-size">Array Size: <span id="size-val" style="color:var(--accent-1);font-weight:bold;">50</span></label>
                <input type="range" id="array-size" min="10" max="200" value="50">
            </div>
            
            <div class="control-group custom-controls hidden">
                <label for="custom-input">Custom Array (space-separated)</label>
                <input type="text" id="custom-input" placeholder="e.g. 5 12 3 8 1 90">
            </div>

            <div class="control-group">
                <button id="btn-generate" class="btn-primary">Generate Array</button>
            </div>
            
            <div class="control-divider"></div>
            
            <div class="control-group playback-controls">
                <button id="btn-play" class="btn-play">▶ Play</button>
                <button id="btn-pause" class="btn-pause hidden">⏸ Pause</button>
                <button id="btn-step" class="btn-step">⏭ Step</button>
            </div>
            
            <div class="control-group">
                <label for="play-speed">Speed</label>
                <input type="range" id="play-speed" min="1" max="100" value="50">
            </div>
        </section>

        <!-- Side by Side Layout -->
        <section class="comparison-grid">
            <!-- Left Side (Algorithm A) -->
            <div class="glass-panel visualizer-card card-a">
                <div class="card-header">
                    <select id="algo-a" class="algo-select">
                        <option value="bubble_sort">Bubble Sort</option>
                        <option value="selection_sort">Selection Sort</option>
                        <option value="insertion_sort">Insertion Sort</option>
                        <option value="merge_sort">Merge Sort</option>
                        <option value="quick_sort">Quick Sort</option>
                        <option value="heap_sort">Heap Sort</option>
                        <option value="shell_sort">Shell Sort</option>
                    </select>
                </div>
                
                <div class="stats-row">
                    <div class="stat-badge">Time: <span id="time-a">—</span></div>
                    <div class="stat-badge">Space: <span id="space-a">—</span></div>
                    <div class="stat-badge ops-badge">Ops: <span id="ops-a">0</span></div>
                </div>

                <div class="canvas-container">
                    <canvas id="canvas-a"></canvas>
                </div>
            </div>

            <!-- Right Side (Algorithm B) -->
            <div class="glass-panel visualizer-card card-b">
                <div class="card-header">
                    <select id="algo-b" class="algo-select">
                        <option value="bubble_sort">Bubble Sort</option>
                        <option value="selection_sort">Selection Sort</option>
                        <option value="insertion_sort">Insertion Sort</option>
                        <option value="merge_sort">Merge Sort</option>
                        <option value="quick_sort" selected>Quick Sort</option>
                        <option value="heap_sort">Heap Sort</option>
                        <option value="shell_sort">Shell Sort</option>
                    </select>
                </div>
                
                <div class="stats-row">
                    <div class="stat-badge">Time: <span id="time-b">—</span></div>
                    <div class="stat-badge">Space: <span id="space-b">—</span></div>
                    <div class="stat-badge ops-badge">Ops: <span id="ops-b">0</span></div>
                </div>

                <div class="canvas-container">
                    <canvas id="canvas-b"></canvas>
                </div>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/visualizer.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
