<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithm Benchmark & Complexity Visualization</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <h1>Algorithm Benchmark Visualizer</h1>
        <p>Project initial setup complete. Ready for development!</p>
    </header>
    <main class="container">
        <section class="controls-section">
            <div class="card">
                <h2>Configure Benchmark</h2>
                <form id="benchmark-form">
                    <div class="form-group">
                        <label for="algorithm">Algorithm Type</label>
                        <select id="algorithm" name="algorithm">
                            <option value="bubble_sort">Bubble Sort</option>
                            <option value="merge_sort">Merge Sort</option>
                            <option value="linear_search">Linear Search</option>
                            <option value="binary_search">Binary Search</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="data-size">Data Size</label>
                        <input type="number" id="data-size" name="data-size" value="1000" min="10" max="100000">
                    </div>
                    <button type="submit" class="btn-primary">Run Benchmark</button>
                </form>
            </div>
        </section>
        
        <section class="visualization-section">
            <div class="card">
                <h2>Performance Visualization</h2>
                <div class="chart-container" style="position: relative; height: 60vh; width: 100%;">
                    <canvas id="benchmarkChart"></canvas>
                </div>
            </div>
        </section>
    </main>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
